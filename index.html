<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الديك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo', sans-serif;
  color:#fff;
  text-align:center;
  background:url('0F558553-425A-4B75-A578-2551C5764CF3.png') center/cover fixed;
}

/* خلفية داكنة */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.78);
  z-index:-1;
}

/* HEADER */
header{
  padding:20px;
}

/* 🔥 LOGO (مدمج مع الخلفية) */
.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

.main-logo{
  width:160px;
  height:auto;

  /* دمج قوي مع الخلفية */
  mix-blend-mode: lighten;
  opacity:0.95;

  /* ظل خفيف جداً */
  filter: drop-shadow(0 0 12px rgba(255,80,0,0.25));

  /* مهم: بدون أي شكل */
  border-radius:0;
}

.sub{
  font-size:14px;
  letter-spacing:4px;
  color:#ffb86b;
  margin-top:10px;
}

/* NAV */
nav{
  margin:15px 0;
}

nav button{
  background:#111;
  color:#ff6a00;
  border:1px solid #ff6a00;
  padding:10px 15px;
  border-radius:30px;
  margin:5px;
  cursor:pointer;
  font-weight:700;
}

/* WELCOME */
#welcome{
  padding:20px;
}

#welcome img{
  width:90%;
  max-width:450px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(255,100,0,0.5);
}

#welcome p{
  margin-top:15px;
  font-weight:bold;
  color:#ffcc80;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.menu.hidden{display:none}

/* CARD */
.dish{
  background:#151515;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,100,0,0.3);
}

.dish img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.dish p{
  padding:10px;
  color:#ffd7a0;
  font-weight:bold;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.controls button{
  background:#ff6a00;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* CART */
.cart{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  display:none;
  padding:20px;
  overflow:auto;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #333;
}

#total{
  color:#ff6a00;
  margin-top:10px;
  font-weight:bold;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
  background:#25D366;
  color:#fff;
  border:none;
  padding:15px;
  width:100%;
  border-radius:30px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6a00;
  border:none;
  padding:15px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}

.cart-count{
  position:fixed;
  bottom:55px;
  right:15px;
  background:red;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}

/* FOOTER */
footer{
  background:#111;
  color:#ff6a00;
  padding:10px;
  margin-top:20px;
}

</style>
</head>

<body>

<header>

<div class="logo">
  <img src="assets/images/logo.png" class="main-logo">
</div>

<div class="sub">FRIED CHICKEN</div>

</header>

<nav>
  <button onclick="show('sandwich')">السندويش</button>
  <button onclick="show('shawerma')">شاورما</button>
  <button onclick="home()">الرئيسية</button>
</nav>

<section id="welcome">
  <img src="assets/images/welcome.jpg">
  <p>✦ عند الديك وقف إذا فيك ✦</p>
</section>

<section id="sandwich" class="menu hidden">

  <div class="dish">
    <img src="assets/images/img1.jpeg">
    <p>مقانق - 350000</p>
    <div class="controls">
      <button onclick="add('مقانق',350000)">➕</button>
      <button onclick="remove('مقانق')">➖</button>
    </div>
  </div>

  <div class="dish">
    <img src="assets/images/img1.jpeg">
    <p>فاهيتا - 400000</p>
    <div class="controls">
      <button onclick="add('فاهيتا',400000)">➕</button>
      <button onclick="remove('فاهيتا')">➖</button>
    </div>
  </div>

</section>

<section id="shawerma" class="menu hidden">

  <div class="dish">
    <img src="assets/images/img1.jpeg">
    <p>شاورما دجاج - 280000</p>
    <div class="controls">
      <button onclick="add('شاورما دجاج',280000)">➕</button>
      <button onclick="remove('شاورما دجاج')">➖</button>
    </div>
  </div>

</section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>🛒 السلة</h2>
  <div id="items"></div>
  <h3 id="total"></h3>

  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="address" placeholder="العنوان">
  <textarea id="note" placeholder="ملاحظة"></textarea>

  <button class="whatsapp" onclick="send()">إرسال واتساب</button>
  <button onclick="closeCart()">إغلاق</button>
</div>

<button class="cart-btn" onclick="openCart()">🛒</button>
<div class="cart-count" id="count">0</div>

<footer>©️ مطعم الديك</footer>

<script>

let cart = {};

function add(n,p){
  if(!cart[n]) cart[n]={q:0,p};
  cart[n].q++;
  render();
}

function remove(n){
  if(cart[n]){
    cart[n].q--;
    if(cart[n].q<=0) delete cart[n];
    render();
  }
}

function render(){
  let c=document.getElementById("items");
  c.innerHTML="";
  let total=0,count=0;

  for(let i in cart){
    total+=cart[i].q*cart[i].p;
    count+=cart[i].q;

    let d=document.createElement("div");
    d.className="cart-item";
    d.innerHTML=i+" x"+cart[i].q+" = "+cart[i].q*cart[i].p;
    c.appendChild(d);
  }

  document.getElementById("total").innerText="المجموع: "+total;
  document.getElementById("count").innerText=count;
}

function openCart(){
  document.getElementById("cart").style.display="block";
  render();
}

function closeCart(){
  document.getElementById("cart").style.display="none";
}

function send(){
  if(Object.keys(cart).length === 0){
    alert("السلة فارغة");
    return;
  }

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;
  let note=document.getElementById("note").value;

  let text="🛒 طلب جديد من الديك %0A%0A";

  for(let i in cart){
    text+=i+" x"+cart[i].q+" = "+(cart[i].q*cart[i].p)+"%0A";
  }

  let total=0;
  for(let i in cart){
    total+=cart[i].q*cart[i].p;
  }

  text+="%0A💰 المجموع: "+total;
  text+="%0A👤 الاسم: "+name;
  text+="%0A📞 الرقم: "+phone;
  text+="%0A📍 العنوان: "+address;
  text+="%0A📝 ملاحظة: "+note;

  window.open("https://wa.me/96181510680?text="+text,"_blank");

  cart={};
  render();
  closeCart();
}

function show(id){
  document.querySelectorAll(".menu").forEach(e=>e.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.getElementById("welcome").style.display="none";
}

function home(){
  document.querySelectorAll(".menu").forEach(e=>e.classList.add("hidden"));
  document.getElementById("welcome").style.display="block";
}

</script>

</body>
</html>
